name: bookshelf
description: "소피의 서재 — 따뜻한 독서 기록 앱"
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.3.1

  # Navigation
  go_router: ^17.1.0

  # Database
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1

  # Network
  http: ^1.6.0

  # Image
  cached_network_image: ^3.4.1

  # UI
  google_fonts: ^8.0.2
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8

  # Utils
  intl: ^0.20.2
  supabase_flutter: ^2.12.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
